<label style="font-family:Lato;">

<p style="font-size:medium;color: aliceblue;">
DIGM is the use-case layer built on Fuego L1 &mdash; a decentralized music marketplace
where independent artists publish albums, sell directly for <b>XFG</b>, and keep 100% of revenue.
DIGM drives swap volume across the Fuego network, which in turn feeds the CD fee pool.
No L2, no L3, no Elderfiers required &mdash; clean L1 architecture.
</p>

<h4 style="color: gold;margin-top: 20px;">How It Works</h4>
<ul>
  <li><b>Artist publishes album</b> &mdash; requires holding <b>DIGM</b> colored coin (on-chain, fixed 100K supply). 10 releases per coin.</li>
  <li><b>Album pricing</b> &mdash; artist sets USD target; XFG amount adjusts via oracle.</li>
  <li><b>Payment</b> &mdash; buyers pay in XFG directly to artist. Artist keeps 100%.</li>
  <li><b>I2P P2P distribution</b> &mdash; every DIGM client is a seeder over I2P garlic-routed network. 256KB ChaCha20 chunks. OGG/Opus 96kbps for streaming, FLAC for album downloads. No central servers.</li>
</ul>

<h4 style="color: gold;margin-top: 20px;">ParaDio+ Streaming Rewards</h4>
<p style="color: aliceblue;">
ParaDio+ is the P2P streaming rewards radio. Listeners earn <b>PARA</b> tokens (1 PARA per minute of verified listening).
Artist and listener each get a share; if played via a curator's playlist, the curator skims 30% from each share.
</p>

<h4 style="color: gold;margin-top: 20px;">Album Staking &amp; Epoch Championships</h4>
<p style="color: aliceblue;">
Listeners stake earned PARA into album "like pools" to signal discovery and boost rankings.
Early stakers earn a higher time-weighted multiplier. Albums compete per epoch (~5 days / 900 blocks,
aligned with the Fuego swap-fee epoch).
</p>
<p style="color: aliceblue;">
When an album hits <b>#1</b> at epoch close:</p>
<ul>
  <li><b>PARA drains</b> &mdash; raw PARA from pool sent to the artist</li>
  <li><b>Transmutation</b> &mdash; each staker's PARA converts to <b>VOX</b> (time-weighted)</li>
  <li><b>nfVOX</b> &mdash; permanent one-per-#1-album trophy awarded to artist</li>
  <li><b>TOP</b> &mdash; singleton championship token, held until dethroned</li>
</ul>

<h4 style="color: gold;margin-top: 20px;">In-App Tokens</h4>
<ul>
  <li><b>PARA</b> &mdash; earned by listening. Staked on albums. Fuel for the economy.</li>
  <li><b>VOX</b> &mdash; transmuted from PARA when your staked album hits #1. Status, cosmetics, song requests (burn VOX), CURA minting.</li>
  <li><b>CURA</b> &mdash; minted by burning VOX. Grants curator rights: public playlists, editorial power.</li>
  <li><b>nfVOX</b> &mdash; one per #1 album. Permanent proof of a hit.</li>
  <li><b>TOP</b> &mdash; singleton. Held by the artist of the current #1 album. Only 1 exists.</li>
</ul>

<h4 style="color: gold;margin-top: 20px;">Architecture</h4>
<ul>
  <li><b>DIGM colored coin</b> &mdash; on-chain on Fuego L1. Controls publishing access.</li>
  <li><b>In-app tokens (PARA/VOX/CURA/nfVOX/TOP)</b> &mdash; tracked off-chain, merkle-anchored to Fuego tx_extra each epoch. Auditable, verifiable.</li>
  <li><b>Mobile-first full node</b> &mdash; ships with full Fuego node + I2P router. iOS (Swift), Android (Kotlin), Desktop (Tauri). Shared Rust core (libfuego).</li>
  <li><b>Every listener is a seeder</b> &mdash; bought albums auto-seed. PARA-staked albums are pinned. Popularity = availability.</li>
</ul>

<h4 style="color: gold;margin-top: 20px;">No Elderfiers / No L2</h4>
<p style="color: aliceblue;">
The L2/L3/Elderfier path was shelved. Fuego focuses on XFG + CD + atomic swaps + hidden amounts.
DIGM becomes the swap volume driver: music purchases in XFG → drive swap fees → feed CD yield.
Two independent flywheels sharing XFG as their medium.
</p>
