<div class="card mg-t-20" id="protocolInfo">
  <div class="card-header tx-medium bd-0 tx-white bg-primary-dark">
    <h2><i class="fa fa-university" aria-hidden="true"></i> HⲶ∆T + Yield Rates</h2>
  </div>
  <div class="card-body card-body-info">
    <div class="row">
      <!-- Hearth AMM -->
      <div class="col-md-6 mg-b-20">
        <div class="card card-body bg-dark">
          <h5 class="tx-white">Hearth AMM</h5>
          <p class="tx-gray-500" id="amm_subtitle">Real-time XFG/HⲶ∆T LP pool</p>
          <div id="amm_info">Loading...</div>
        </div>
      </div>
      <!-- Commitment Deposits -->
      <div class="col-md-6 mg-b-20">
        <div class="card card-body bg-dark">
          <h5 class="tx-white">Commitment Deposits (CDs)</h5>
          <p class="tx-gray-500">SwapXFG fee yield & active deposits</p>
          <div id="cd_info">Loading...</div>
        </div>
      </div>
      <!-- HⲶ∆T Metrics -->
      <div class="col-md-6 mg-b-20">
        <div class="card card-body bg-dark">
          <h5 class="tx-white">HⲶ∆T Metrics</h5>
          <p class="tx-gray-500">Supply & Burn</p>
          <div id="heat_metrics">Loading...</div>
        </div>
      </div>
      <!-- Treasury -->
      <div class="col-md-6 mg-b-20">
        <div class="card card-body bg-dark">
          <h5 class="tx-white">Protocol Treasury</h5>
          <p class="tx-gray-500">Protocol reserve balance</p>
          <div id="treasury_info">Loading...</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  currentPage = {
    destroy: function () { },
    init: function () {
      loadTranslations();
      $('#amm_subtitle').text('Real-time ' + symbol + '/HⲶ∆T LP pool');
      this.update();
    },
    update: function () {
      // Hearth AMM
      $.getJSON(xfgApi + '/node/amm/pool', function(d) {
        $('#amm_info').html('Pool: ' + (d.reserve_xfg/coinUnits).toFixed(2) + ' ' + symbol + ' / ' + (d.reserve_heat/1000000).toFixed(2) + ' HⲶ∆T<br>Spot Price: ' + d.spot_price);
      });
      // CDs
      $.getJSON(xfgApi + '/node/cd/yield?amount=1000&term=900', function(d) {
        $('#cd_info').html(`Est. APY: ${d.apy}%<br>Total Deposits: ${d.total_deposits/coinUnits} HⲶ∆T`);
      });
      // HⲶ∆T Metrics
      $.getJSON(xfgApi + '/node/heat/metrics', function(d) {
        $('#heat_metrics').html(`Circulating: ${d.circulating/1000000} HⲶ∆T<br>Redemption Price: ${d.peg_price}`);
      });
      // Treasury
      $.getJSON(xfgApi + '/node/treasury', function(d) {
        $('#treasury_info').html(`Balance: ${d.balance/coinUnits} HⲶ∆T`);
      });
    }
  };
</script>
